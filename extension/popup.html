<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Speech</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --panel: rgba(255, 255, 255, 0.84);
      --ink: #1f1a16;
      --muted: #675f57;
      --line: #d9cdbf;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --accent-soft: #d6f1ee;
      --success: #2d8a57;
      --danger: #1b1916;
      --danger-text: #bb4f5f;
      --warning: #d1a23a;
      --log-bg: #1f241f;
      --log-text: #f3eee6;
      --card-shadow: 0 16px 40px rgba(31, 26, 22, 0.08);
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #141715;
      --panel: rgba(31, 29, 25, 0.92);
      --ink: #f3eee6;
      --muted: #c4bbad;
      --line: #4b463b;
      --accent: #21988d;
      --accent-strong: #9bf3e7;
      --accent-soft: rgba(33, 152, 141, 0.18);
      --success: #64cb93;
      --danger: #161412;
      --danger-text: #e38a98;
      --warning: #e1be68;
      --log-bg: #171b18;
      --log-text: #f3eee6;
      --card-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 320px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.14), transparent 34%),
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.26), transparent 30%),
        linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
      padding: 16px;
      color: var(--ink);
    }
    body[data-theme="dark"] {
      background:
        radial-gradient(circle at top right, rgba(33, 152, 141, 0.16), transparent 38%),
        radial-gradient(circle at top left, rgba(9, 55, 46, 0.24), transparent 26%),
        linear-gradient(180deg, #171b18 0%, var(--bg) 100%);
      color: var(--ink);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-brand-icon {
      width: 20px;
      height: 20px;
      display: block;
      border-radius: 4px;
      flex: 0 0 auto;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .theme-toggle {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--card-shadow);
    }
    .status-badge {
      font-size: 10px;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-badge.ready {
      background: rgba(45, 138, 87, 0.14);
      color: #205c3d;
    }
    .status-badge.loading {
      background: rgba(209, 162, 58, 0.16);
      color: #7e5b18;
    }
    .status-badge.error {
      background: rgba(187, 79, 95, 0.14);
      color: #8a3142;
    }
    .divider {
      height: 1px;
      background: var(--line);
      margin: 10px 0;
    }
    .voice-selector {
      margin: 8px 0 12px;
    }
    .voice-selector label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    .voice-selector select {
      width: 100%;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font-size: 13px;
      background: #fffdf8;
      color: var(--ink);
      cursor: pointer;
    }
    body[data-theme="dark"] .voice-selector select {
      background: rgba(37, 33, 28, 0.96);
      color: var(--ink);
      border-color: var(--line);
    }
    .voice-selector select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn-group {
      display: flex;
      gap: 8px;
      margin: 12px 0 8px;
    }
    .btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-strong);
    }
    .btn-danger {
      background: var(--danger);
      color: var(--danger-text);
      border-color: rgba(187, 79, 95, 0.28);
    }
    .btn-danger:hover:not(:disabled) {
      filter: brightness(1.06);
    }
    .btn-secondary {
      background: rgba(43, 34, 26, 0.38);
      color: var(--ink);
      border-color: var(--line);
    }
    .btn-secondary:hover:not(:disabled) {
      background: rgba(43, 34, 26, 0.52);
    }
    body[data-theme="dark"] .btn-secondary {
      background: rgba(37, 33, 28, 0.88);
      color: var(--ink);
      border-color: var(--line);
    }
    body[data-theme="dark"] .btn-secondary:hover:not(:disabled) {
      background: rgba(56, 49, 41, 0.96);
    }
    .btn-success {
      background: var(--success);
      color: white;
    }
    .btn-success:hover:not(:disabled) {
      filter: brightness(0.95);
    }
    .btn-sm {
      padding: 6px 12px;
      font-size: 11px;
      flex: 0 0 auto;
      min-width: 74px;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 0;
    }
    .status-row .label {
      font-weight: 500;
    }
    .status-row .value {
      font-family: monospace;
      font-size: 11px;
      color: var(--ink);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.green { background: #28a745; }
    .status-dot.yellow { background: #d1a23a; }
    .status-dot.red { background: #bb4f5f; }

    .launch-progress {
      width: 100%;
      height: 6px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
      display: none;
      margin: 6px 0 2px;
    }
    .launch-progress.active {
      display: block;
    }
    .launch-progress-fill {
      width: 40%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      animation: launch-progress-slide 1.1s ease-in-out infinite;
    }
    .launch-progress-note {
      display: none;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .launch-progress-note.active {
      display: block;
    }

    @keyframes launch-progress-slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(280%); }
    }

    .log-area {
      background: var(--log-bg);
      color: var(--log-text);
      font-family: "Consolas", monospace;
      font-size: 10px;
      padding: 10px;
      border-radius: 10px;
      max-height: 100px;
      overflow-y: auto;
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.4;
    }
    .log-area .log-error { color: #f8a5b0; }
    .log-area .log-success { color: #9de2bc; }
    .log-area .log-info { color: #9bf3e7; }

    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 10px;
      color: var(--muted);
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }
    .footer a:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body data-theme="light">

  <div class="header">
    <h3>
      <img src="icons/icon48.png" alt="Pocket TTS icon" class="header-brand-icon">
      <span>Browser Speech</span>
    </h3>
    <div class="header-actions">
      <button id="themeToggleBtn" class="theme-toggle" type="button">Dark</button>
      <span id="statusBadge" class="status-badge loading">Loading</span>
    </div>
  </div>

  <div class="status-row">
    <span class="label"><span id="statusDot" class="status-dot yellow"></span>Runtime</span>
    <span class="value" id="serverStatus">Checking...</span>
  </div>

  <div class="divider"></div>

  <div class="voice-selector">
    <label for="voiceSelect">Voice</label>
    <select id="voiceSelect">
      <option value="Pocket Alba">Pocket Alba</option>
      <option value="Pocket Michael">Pocket Michael</option>
      <option value="Pocket Anna">Pocket Anna</option>
    </select>
  </div>

  <div class="btn-group">
    <button id="speakBtn" class="btn btn-primary">Speak</button>
    <button id="stopBtn" class="btn btn-danger">Stop</button>
  </div>

  <div class="divider"></div>

  <div class="btn-group">
    <button id="stopServerBtn" class="btn btn-secondary btn-sm">Refresh</button>
    <button id="optionsBtn" class="btn btn-secondary btn-sm">Panel</button>
    <button id="clearLogBtn" class="btn btn-secondary btn-sm">Clear</button>
  </div>

  <div id="launchProgress" class="launch-progress">
    <div class="launch-progress-fill"></div>
  </div>
  <div id="launchProgressNote" class="launch-progress-note">Checking local Pocket runtime...</div>

  <div id="logArea" class="log-area">Ready</div>

  <div class="footer">
    <span id="extensionId">v0.1.0</span>
    <a id="openOptionsLink">Open Panel</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
